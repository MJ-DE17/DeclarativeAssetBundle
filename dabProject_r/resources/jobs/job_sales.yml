resources:
  jobs:
    sales_dab_job:
      name: sales_dab_job

      tasks:
        - task_key: sales_job_bronze
          notebook_task:
            notebook_path: ../../src/notebooks/NB_01_bronze.ipynb
            source: WORKSPACE
          environment_key: Default

        - task_key: silver_job_sales
          depends_on:
            - task_key: sales_job_bronze
          notebook_task:
            notebook_path: ../../src/notebooks/NB_02_silver.ipynb
            source: WORKSPACE
          environment_key: Default   # ✅ ADD THIS

        - task_key: gold_job_sales
          depends_on:
            - task_key: silver_job_sales
          notebook_task:
            notebook_path: ../../src/notebooks/NB_03_gold.ipynb
            source: WORKSPACE
          environment_key: Default   # ✅ ADD THIS

      environments:
        - environment_key: Default
          spec:
            environment_version: "5"

      queue:
        enabled: true